name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'template.yaml'
      - 'samconfig.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - 'tests/**'
      - 'tsconfig.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'template.yaml'
      - 'samconfig.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - 'tests/**'
      - 'tsconfig.json'

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit test
        run: pnpm test

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Build SAM application
        run: pnpm sam:build
